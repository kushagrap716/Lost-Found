<!DOCTYPE html>

<html>
<head>
<title>Item Gallery</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial;
}

body{
background:linear-gradient(to right,#2193b0,#6dd5ed);
padding-top:80px;
}

/* NAVBAR */

.navbar{
background:white;
position:fixed;
top:0;
width:100%;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.navbar-container{
max-width:1200px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
}

.logo{
font-size:22px;
font-weight:bold;
color:#185a9d;
}

.nav-links{
display:flex;
gap:20px;
}

.nav-links a{
text-decoration:none;
color:#333;
}

/* PAGE CONTAINER */

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

/* GALLERY GRID */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* CARD */

.card{
background:white;
padding:20px;
border-radius:10px;
position:relative;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* RIGHT SIDE CONTROLS */

.controls{
position:absolute;
top:10px;
right:10px;
display:flex;
flex-direction:column;
gap:6px;
align-items:center;
}

/* STATUS CIRCLE */

.status{
width:14px;
height:14px;
border-radius:50%;
}

.red{
background:red;
}

.green{
background:green;
}

/* DELETE BUTTON */

.deleteBtn{
width:14px;
height:14px;
background:#e74c3c;
color:white;
border:none;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:9px;
cursor:pointer;
}

/* CLAIM INFO BOX */

.claim-info{
margin-top:10px;
background:#f4f4f4;
padding:8px;
border-radius:6px;
font-size:13px;
}

</style>

</head>

<body>

<div class="navbar">
<div class="navbar-container">

<div class="logo">📦 I FOUND</div>

<div class="nav-links">
<a href="Project.html">Home</a>
<a href="Lost.html">Lost Item</a>
<a href="Found.html">Found Item</a>
</div>

</div>
</div>

<div class="container">

<h1 style="color:white;margin-bottom:30px;">Found Items Gallery</h1>

<div class="gallery" id="gallery"></div>

</div>

<script>

/* LOAD ITEMS */

let items = JSON.parse(localStorage.getItem("foundItems")) || [];

let gallery = document.getElementById("gallery");

/* CHECK ADMIN MODE */

let isAdmin = localStorage.getItem("admin") === "true";

/* DISPLAY ITEMS */

items.forEach((item,index)=>{

let card=document.createElement("div");
card.className="card";

let color=item.status==="claimed"?"green":"red";

let deleteButton="";
let claimDetails="";

/* DELETE BUTTON ONLY FOR ADMIN */

if(isAdmin){

deleteButton=`<button class="deleteBtn" onclick="deleteItem(${index})">✖</button>`;

}

/* CLAIM DETAILS ONLY FOR ADMIN */

if(item.claimer && isAdmin){

claimDetails=`

<div class="claim-info">

<b>Claimed By:</b> ${item.claimer.name}<br>

<b>Mobile:</b> ${item.claimer.mobile}<br>

<b>LR No:</b> ${item.claimer.lr}

</div>

`;

}

card.innerHTML=`

<div class="controls">

<div class="status ${color}"></div>

${deleteButton}

</div>

<h3>${item.name}</h3>

<p>${item.description}</p>

<p><b>Location:</b> ${item.location}</p>

<p><b>Date:</b> ${item.date}</p>

${claimDetails}

`;

gallery.appendChild(card);

});

/* DELETE ITEM */

function deleteItem(index){

let items = JSON.parse(localStorage.getItem("foundItems")) || [];

if(confirm("Delete this item?")){

items.splice(index,1);

localStorage.setItem("foundItems",JSON.stringify(items));

location.reload();

}

}

</script>

</body>
</html>
