<!DOCTYPE html>

<html>
<head>
<title>Claim Item</title>

<style>

body{
font-family:Arial;
background:linear-gradient(to right,#ff9966,#ff5e62);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:350px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-bottom:12px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#2ecc71;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Claim Item</h2>

<input type="text" id="name" placeholder="Enter Name" required>

<input type="text" id="mobile" placeholder="Mobile Number" required>

<input type="text" id="lrno" placeholder="LR Number" required>

<button onclick="submitClaim()">Submit</button>

</div>

<script>

function submitClaim(){

let name=document.getElementById("name").value;
let mobile=document.getElementById("mobile").value;
let lr=document.getElementById("lrno").value;

let index=localStorage.getItem("claimItemIndex");

let items=JSON.parse(localStorage.getItem("foundItems"))||[];

items[index].status="claimed";

items[index].claimer={
name:name,
mobile:mobile,
lr:lr
};

localStorage.setItem("foundItems",JSON.stringify(items));

alert("Claim submitted successfully");

window.location.href="Gallery.html";

}

</script>

</body>
</html>
